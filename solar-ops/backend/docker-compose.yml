version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: solar_ops_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solar_ops
    volumes:
      - solar_ops_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar_ops_network

  redis:
    image: redis:7-alpine
    container_name: solar_ops_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar_ops_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solar_ops_backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/solar_ops
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - solar_ops_network

networks:
  solar_ops_network:
    driver: bridge

volumes:
  solar_ops_db:
